<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Branksbowl 26/27</title>
  <script>
    // Applied before the stylesheet paints, so there's no flash of the wrong theme.
    (function () {
      var t = localStorage.getItem("theme");
      if (!t) t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <div class="wrap">
      <div class="brand">Branksbowl<span class="yr">26/27</span></div>
      <div class="header-btns">
        <span id="statusBadge" class="badge"></span>
        <button id="themeToggle" class="theme-toggle" title="Toggle dark mode">🌙</button>
      </div>
    </div>
  </header>

  <nav id="tabs">
    <div class="wrap">
      <button data-view="league" class="active">League</button>
      <button data-view="fixtures">Fixtures</button>
      <button data-view="h2h">Head-to-Head</button>
      <button data-view="records">Hall of Fame</button>
      <button data-view="rules">Rules</button>
      <button data-view="setup">Setup</button>
      <select id="seasonPicker" class="me-picker" title="Pick a season" style="display:none"></select>
      <select id="mePicker" class="me-picker" title="Pick your team to highlight it"></select>
    </div>
  </nav>

  <main id="app"></main>

  <div id="toast" class="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
