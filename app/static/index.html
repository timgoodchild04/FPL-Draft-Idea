<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Branksbowl</title>
  <link rel="icon" href="/static/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/static/favicon-192.png" />

  <!-- installable app (PWA) -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f1729" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Branksbowl" />
  <script>
    // Applied before the stylesheet paints, so there's no flash of the wrong theme.
    // Dark is the default; a visitor's own toggle choice (saved below) always wins.
    (function () {
      var t = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <div class="wrap">
      <div class="brand-wrap">
        <div class="brand">Branksbowl</div>
        <button id="brandEdit" class="brand-edit" title="Rename league" aria-label="Rename league" style="display:none">✏️</button>
      </div>
      <div class="header-btns">
        <span id="statusBadge" class="badge"></span>
        <button id="themeToggle" class="theme-toggle" title="Toggle dark mode">🌙</button>
        <button id="setupCog" class="theme-toggle" title="Admin setup">⚙️</button>
      </div>
    </div>
  </header>

  <nav id="tabs">
    <div class="wrap">
      <button data-view="league" class="active">League</button>
      <button data-view="fixtures">Fixtures</button>
      <button data-view="records">Hall of Fame</button>
      <button data-view="rules">Rules</button>
      <div class="picker-group">
        <select id="seasonPicker" class="me-picker" title="Pick a season" style="display:none"></select>
        <select id="mePicker" class="me-picker" title="Pick your team to highlight it"></select>
      </div>
    </div>
  </nav>

  <main id="app"></main>

  <div id="loginModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:0">Admin login</h3>
        <button class="mini-link" id="loginModalClose" title="Close" style="font-size:18px">✕</button>
      </div>
      <label>Username</label><input id="modal-user" autocomplete="username">
      <label>Password</label><input id="modal-pass" type="password" autocomplete="current-password">
      <div class="btns"><button class="btn" id="modal-login-btn">Log in</button></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/static/app.js"></script>
  <script>
    // Register the service worker so the app is installable and loads offline.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
