name: keep-alive

# Pings the live site so Render's free tier never spins it down (it sleeps after
# ~15 min idle, causing a ~30-50s cold start on the next visit). Every 10 minutes
# during ~07:00-01:00 UK time; left to sleep overnight to stay well within
# Render's 750 instance-hours/month free allowance.

on:
  schedule:
    - cron: "*/10 6-23 * * *"   # every 10 min, 06:00-23:59 UTC
  workflow_dispatch: {}          # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          echo "Pinging site (a cold start can take up to ~60s)…"
          curl -fsS --max-time 90 https://fpl-draft-league.onrender.com/health || true
